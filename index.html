<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myntra Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Myntra Clone</div>
        <nav>
            <ul>
                <li>Men</li>
                <li>Women</li>
                <li>Kids</li>
                <li>Home & Living</li>
                <li>Beauty</li>
            </ul>
        </nav>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search for products, brands and more">
        </div>
        <div class="actions">
            <span>Profile</span>
            <span>Wishlist</span>
            <span>Bag</span>
        </div>
    </header>
    <main>
        <section class="banner">
            <h1>Welcome to the Ultimate Fashion Destination</h1>
        </section>
        <section class="products" id="product-list">
            <!-- Products will be injected here via JavaScript -->
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Myntra Clone. For learning purposes only.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
